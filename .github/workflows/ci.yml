name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny token permissions. Each job widens what it actually needs;
# anything else (a malicious dep in CI, a compromised action) can't push
# commits or create releases with the default token.
permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra serve --extra bedrock

      # Run the same pre-commit hooks contributors run locally. Single source
      # of truth — if a hook is added/removed/version-bumped in
      # `.pre-commit-config.yaml`, CI picks it up automatically and we don't
      # have to also edit this workflow.
      - name: Pre-commit hooks (lint, format, file hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (advisory — manual stage in pre-commit, non-blocking here)
        continue-on-error: true
        run: uv run pre-commit run --all-files --hook-stage manual mypy

      - name: Test
        run: uv run pytest tests/ -v --ignore=tests/evals --ignore=tests/test_integration.py

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/mira

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/mira/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    # Build the unified UI+backend image and smoke-test it boots. Catches
    # packaging issues (missing extras, broken Dockerfile, bad UI assets)
    # before they hit a release tag.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t mira:ci .

      # Image ENTRYPOINT is `mira serve`, so anything after the image name
      # is appended as args to `serve`. Override the entrypoint for tests
      # that need a different command.
      - name: Smoke test — CLI runs
        run: docker run --rm --entrypoint mira mira:ci --help

      - name: Smoke test — `mira serve --help` via default ENTRYPOINT
        run: docker run --rm mira:ci --help

      - name: Smoke test — UI assets bundled
        run: docker run --rm --entrypoint ls mira:ci /app/ui_dist/index.html
